name: 直播状态检测

on:
  # 注意：GitHub Actions schedule 不太稳定，可能延迟或跳过
  # 建议配合外部 cron 服务（如 cron-job.org）使用，通过 workflow_dispatch 触发
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - rooms.json
      - post_rooms.json

# 串行执行，避免并发 run 互相覆盖状态 / 提交冲突导致重复推送
concurrency:
  group: live-check
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    # 作品监控总开关：设为 "true" 启用；列表（post_rooms.json）为空时整段跳过，不浪费资源
    env:
      ENABLE_POST_CHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 运行直播检测（状态文件由 checkout 恢复，已是上一次提交的最新状态）
      - name: Run check
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
        run: python3 check_status.py

      # 判断作品监控列表是否非空（空则不安装/运行浏览器）
      - name: Check post_rooms list
        id: postlist
        if: ${{ env.ENABLE_POST_CHECK == 'true' }}
        run: |
          n=$(python3 -c "import json;print(len(json.load(open('post_rooms.json'))))" 2>/dev/null || echo 0)
          if [ "$n" != "0" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      # 缓存 Playwright 浏览器（仅作品监控使用，静态资源，不存在状态陈旧问题）
      - name: Cache Playwright browsers
        if: ${{ steps.postlist.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1.58.0

      # 安装 Playwright + Chromium（仅启用且列表非空时需要）
      - name: Install Playwright
        if: ${{ steps.postlist.outputs.enabled == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # 新作品监控（无头浏览器抓取用户主页，绕过抖音反爬；列表来自独立的 post_rooms.json）
      - name: Check new posts
        if: ${{ steps.postlist.outputs.enabled == 'true' }}
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
          ENABLE_POST_CHECK: "true"
        run: python3 check_new_posts.py

      # 状态持久化到 Git —— 唯一真相来源，跨 run 可靠，不再依赖易失效的 actions/cache
      - name: Persist state & keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          # 状态文件被 .gitignore 忽略，用 -f 强制纳入版本控制
          git add -f state.json tracking.json history.json post_tracking.json
          # 每次运行更新时间戳，保证仓库持续有活动（防 60 天自动停用 schedule）
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git add .keepalive
          git commit -m "📡 update state [skip ci]" || true
          # 拉取远端最新，避免并发/外部推送造成的非快进冲突
          git pull --rebase origin master 2>/dev/null || true
          git push origin HEAD:master 2>&1 || echo "push failed (状态将在下一次 run 自动对齐)"

      # 构建 Pages 目录（同域名部署；状态已提交 Git 作可靠后备）
      - name: Build Pages
        run: |
          mkdir -p _site
          cp monitor.html _site/
          cp libsodium.js _site/ 2>/dev/null || true
          cp monitor-*.html _site/ 2>/dev/null || true
          cp index.html _site/ 2>/dev/null || true
          cp rooms.json _site/
          cp status.json _site/
          cp history.json _site/
          cp post_rooms.json _site/
          cp post_tracking.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  # 独立测试任务：运行 pytest 回归套件（不影响监控/部署，仅作质量信号）
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q

  deploy:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
