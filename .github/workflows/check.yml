name: 直播状态检测

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    paths:
      - rooms.json

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
        run: python3 check_status.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json status.json history.json
          # 检查上次提交时间，间隔>10分钟才提交（避免自己触发太频繁）
          LAST=$(git log -1 --format=%ct -- state.json 2>/dev/null || echo 0)
          NOW=$(date +%s)
          DIFF=$((NOW - LAST))
          if git diff --cached --quiet; then
            echo "No changes"
          elif [ $DIFF -gt 600 ]; then
            git commit -m "📡 Update live status" && git push
          else
            echo "Skip commit (last was ${DIFF}s ago)"
          fi
