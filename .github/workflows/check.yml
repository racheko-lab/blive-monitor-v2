name: 直播状态检测

on:
  schedule:
    - cron: "*/5 * * * *"  # 每5分钟
  workflow_dispatch:       # 手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
        run: python3 check_status.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json status.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📡 Update live status [skip ci]"
            git push
          fi
