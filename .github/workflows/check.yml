name: 直播状态检测

on:
  # 注意：GitHub Actions schedule 不太稳定，可能延迟或跳过
  # 建议配合外部 cron 服务（如 cron-job.org）使用，通过 workflow_dispatch 触发
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - rooms.json
      - post_rooms.json

# 串行执行，避免并发 run 互相覆盖状态 / 提交冲突导致重复推送
concurrency:
  group: live-check
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    # 作品监控总开关：设为 "true" 启用；列表（post_rooms.json）为空时整段跳过，不浪费资源
    env:
      ENABLE_POST_CHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 判断 rooms.json 是否含 xhs 房间（需要无头 chromium 渲染直播间）
      - name: Check xhs rooms
        id: xhslist
        run: |
          n=$(python3 -c "import json;d=json.load(open('rooms.json'));print(sum(1 for r in d if r.get('platform')=='xhs')))" 2>/dev/null || echo 0)
          if [ "$n" != "0" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      # 判断作品监控列表是否非空（空则不安装/运行浏览器）
      - name: Check post_rooms list
        id: postlist
        if: ${{ env.ENABLE_POST_CHECK == 'true' }}
        run: |
          n=$(python3 -c "import json;print(len(json.load(open('post_rooms.json'))))" 2>/dev/null || echo 0)
          if [ "$n" != "0" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      # 缓存 Playwright 浏览器（xhs 直播监控 / 作品监控使用）
      - name: Cache Playwright browsers
        if: ${{ steps.xhslist.outputs.enabled == 'true' || steps.postlist.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1.58.0

      # 安装 Playwright + Chromium（xhs 直播监控或作品监控需要）
      - name: Install Playwright
        if: ${{ steps.xhslist.outputs.enabled == 'true' || steps.postlist.outputs.enabled == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # 运行直播检测（xhs 房间此时已可用 chromium 渲染直播间）
      - name: Run check
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
        run: python3 check_status.py

      # 新作品监控（无头浏览器抓取用户主页，绕过抖音反爬；列表来自独立的 post_rooms.json）
      - name: Check new posts
        if: ${{ steps.postlist.outputs.enabled == 'true' }}
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
          ENABLE_POST_CHECK: "true"
        run: python3 check_new_posts.py

      # 状态持久化到 Git —— 唯一真相来源，跨 run 可靠，不再依赖易失效的 actions/cache
      - name: Persist state & keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          # 关键：先拉取远端最新再提交。此时工作区为 checkout 的干净状态，rebase
          # 不会与本地改动冲突；若仍有冲突则 abort，绝不在冲突态下 push（否则状态文件丢失、
          # 下一轮把同一次开播/上新当成「首次」重新推送，造成重复通知）。
          git pull --rebase origin master 2>&1 || git rebase --abort 2>/dev/null || true
          # 状态文件被 .gitignore 忽略，用 -f 强制纳入版本控制；notify_dedup.json 为去重账本，同样需持久化
          # 注：post_rooms.json 也会被后端写回（固化解析出的 sec_uid），一并纳入版本控制，
          # 使「前端网页添加的账号」在首次解析后与「预存 sec_uid 的账号」行为一致。
          git add -f state.json tracking.json history.json post_tracking.json post_rooms.json notify_dedup.json
          # 每次运行更新时间戳，保证仓库持续有活动（防 60 天自动停用 schedule）
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git add .keepalive
          git commit -m "📡 update state [skip ci]" || true
          # 推送（失败重试一次；仍失败则本次状态将在下一轮自动对齐，去重账本兜底防刷屏）
          for i in 1 2; do
            if git push origin HEAD:master 2>&1; then
              break
            fi
            echo "push 失败，重试 ($i)..."
            git pull --rebase origin master 2>&1 || git rebase --abort 2>/dev/null || true
          done || echo "push failed (状态将在下一次 run 自动对齐)"

      # 构建 Pages 目录（同域名部署；状态已提交 Git 作可靠后备）
      - name: Build Pages
        run: |
          mkdir -p _site
          cp monitor.html _site/
          cp libsodium.js _site/ 2>/dev/null || true
          cp monitor-*.html _site/ 2>/dev/null || true
          cp index.html _site/ 2>/dev/null || true
          cp rooms.json _site/
          cp status.json _site/
          cp history.json _site/
          cp post_rooms.json _site/
          cp post_tracking.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  # 独立测试任务：运行 pytest 回归套件（不影响监控/部署，仅作质量信号）
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q

  deploy:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
