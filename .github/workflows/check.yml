name: 直播状态检测

on:
  # 注意：GitHub Actions schedule 不太稳定，可能延迟或跳过
  # 建议配合外部 cron 服务（如 cron-job.org）使用，通过 workflow_dispatch 触发
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - rooms.json

# 串行执行，避免并发 run 互相覆盖状态 / 提交冲突导致重复推送
concurrency:
  group: live-check
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 运行检测（状态文件由 checkout 恢复，已是上一次提交的最新状态）
      - name: Run check
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
        run: python3 check_status.py

      # 新作品监控（默认关闭，需显式开启 ENABLE_POST_CHECK）
      - name: Check new posts (disabled by default)
        env:
          BLIVE_CONFIG: ${{ secrets.BLIVE_CONFIG }}
          # ENABLE_POST_CHECK: "true"
        run: python3 check_new_posts.py

      # 状态持久化到 Git —— 唯一真相来源，跨 run 可靠，不再依赖易失效的 actions/cache
      - name: Persist state & keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 状态文件被 .gitignore 忽略，用 -f 强制纳入版本控制
          git add -f state.json tracking.json history.json
          # 每次运行更新时间戳，保证仓库持续有活动（防 60 天自动停用 schedule）
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git add .keepalive
          git commit -m "📡 update state [skip ci]" || true
          # 拉取远端最新，避免并发/外部推送造成的非快进冲突
          git pull --rebase origin master 2>/dev/null || true
          git push origin HEAD:master 2>&1 || echo "push failed (状态将在下一次 run 自动对齐)"

      # 构建 Pages 目录（同域名部署；状态已提交 Git 作可靠后备）
      - name: Build Pages
        run: |
          mkdir -p _site
          cp monitor.html _site/
          cp index.html _site/ 2>/dev/null || true
          cp rooms.json _site/
          cp status.json _site/
          cp history.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
