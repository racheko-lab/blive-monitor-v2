name = "blive-monitor-api"
main = "api/worker.js"
compatibility_date = "2024-09-23"

# 部署前在 Cloudflare 控制台获取并填入你的 account_id
# account_id = "你的 Cloudflare 账户 ID"

[vars]
# 监控仓库坐标（racheko-lab/blive-monitor）
GH_REPO = "racheko-lab/blive-monitor"
# 目标分支（仓库默认分支）
BRANCH = "master"
# 共享口令：明文存放于此（本就暴露于前端 JS，仅防随手乱改）
# 必须与前端 monitor.html 顶部的 API_PASS 保持一致
PASSPHRASE = "change-me-shared-passphrase"
# 允许跨域的源（GitHub Pages 站点地址）
ALLOWED_ORIGIN = "https://racheko-lab.github.io"

# GitHub 细粒度 PAT（仅该仓库 contents:write）必须作为 Secret 注入，切勿写入本文件：
#   wrangler secret put GH_TOKEN
