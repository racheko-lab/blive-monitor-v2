<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>B站/抖音 直播监控</title>
<style>
:root{--bg:#0a0a0f;--card:#141420;--accent:#fb7299;--live:#ff4d4f;
  --text:#e8e8e8;--text2:#999;--green:#52c41a;--blue:#1890ff;--yellow:#faad14;--border:#222;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 80px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.92);
  backdrop-filter:blur(12px);padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border)}
.topbar h1{font-size:17px;font-weight:700;color:var(--accent)}
.topbar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-ok{background:var(--green);box-shadow:0 0 6px rgba(82,196,26,.5)}
.dot-warn{background:var(--yellow)}
.dot-live{background:var(--live)}
.content{padding:12px 16px}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border-radius:var(--radius);padding:4px}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text2);border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff}
.room-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid #333;transition:border-color .3s}
.room-card.live{border-left-color:var(--live)}
.room-card.replay{border-left-color:var(--yellow)}
.room-card.offline{border-left-color:#444}
.room-card .row1{display:flex;align-items:flex-start;justify-content:space-between}
.room-card .name{font-size:15px;font-weight:700}
.room-card .info{font-size:12px;color:var(--text2);margin-top:6px}
.room-card .info .val{color:var(--text)}
.btn-sm{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-block;margin-top:8px}
.btn-live{background:var(--live);color:#fff}.btn-replay{background:var(--yellow);color:#000}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.badge-live{background:rgba(255,77,79,.15);color:var(--live)}
.badge-replay{background:rgba(250,173,20,.15);color:var(--yellow)}
.badge-offline{background:rgba(102,102,102,.15);color:#888}
.badge-checking{background:rgba(24,144,255,.15);color:var(--blue)}
.platform-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;margin-left:8px}
.tag-bili{background:rgba(251,114,153,.15);color:var(--accent)}
.tag-dy{background:rgba(24,144,255,.15);color:var(--blue)}

/* 设置面板 */
.setup-panel{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.setup-panel summary{font-size:14px;font-weight:600;cursor:pointer;padding:4px 0;color:var(--text2);list-style:none}
.setup-panel summary::after{content:' ⚙️'}
.setup-panel[open] summary::after{content:' ✕'}
.setup-body{margin-top:12px}
.setup-body label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.setup-body input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;margin-bottom:10px;outline:none}
.btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn:active{opacity:.7}.btn-p{background:var(--accent);color:#fff}
.btn-s{background:transparent;border:1px solid #444;color:var(--text)}
.btn-g{background:var(--green);color:#fff}

/* 房间管理 */
.platform-picker{display:flex;gap:8px;margin-bottom:10px}
.plat-btn{flex:1;padding:10px 0;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.plat-btn.active.bilibili{border-color:var(--accent);background:rgba(251,114,153,.08);color:var(--accent)}
.plat-btn.active.douyin{border-color:var(--blue);background:rgba(24,144,255,.08);color:var(--blue)}
.room-config-list{margin-bottom:8px}
.room-config-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.room-config-item .rc-platform{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.rc-bili{background:rgba(251,114,153,.12);color:var(--accent)}
.rc-dy{background:rgba(24,144,255,.12);color:var(--blue)}
.room-config-item .rc-info{flex:1;min-width:0}
.room-config-item .rc-name{font-size:13px;font-weight:600}
.room-config-item .rc-id{font-size:11px;color:var(--text2)}
.room-config-item .rc-del{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,77,79,.1);color:var(--live);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.footer-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.94);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.footer-bar .btn{flex:1;font-size:12px;padding:8px}
.tip{background:rgba(24,144,255,.08);border:1px solid rgba(24,144,255,.15);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--blue);margin-top:8px;line-height:1.5}
.hidden{display:none!important}
.spinner{width:16px;height:16px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>📡 直播监控</h1></div>
  <div style="font-size:11px;color:var(--text2)">
    <span id="statusDot"><span class="dot dot-warn"></span>加载中</span>
    <span id="updateTime" style="margin-left:8px;font-size:10px"></span>
  </div>
</div>

<div class="content">
<details class="setup-panel">
  <summary>添加监控房间</summary>
  <div class="setup-body">
    <div class="platform-picker">
      <button class="plat-btn active bilibili" data-plat="bilibili" onclick="pickPlatform('bilibili')">📺 B站</button>
      <button class="plat-btn" data-plat="douyin" onclick="pickPlatform('douyin')">🎵 抖音</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="newRoomId" placeholder="房间号" style="flex:1;margin-bottom:0" inputmode="numeric">
      <input type="text" id="newRoomName" placeholder="昵称(选填)" style="flex:2;margin-bottom:0">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-p" onclick="addRoom()">➕ 添加</button>
      <button class="btn btn-s" onclick="quickFill()">📋 快速预设</button>
    </div>

    <label>已监控房间 (<span id="roomCount">0</span>)</label>
    <div class="room-config-list" id="roomConfigList">
      <div style="text-align:center;padding:16px;color:var(--text2);font-size:12px">还没有添加房间</div>
    </div>
    <div class="tip">
      ⚡ <b>网页添加的房间</b>：临时查看状态（通过代理，不一定稳定）。<br>
      ✅ <b>要永久监控 + 微信推送</b>：点<a href="https://github.com/racheko-lab/blive-monitor/edit/master/rooms.json" target="_blank">这里编辑 rooms.json →</a> 添加房间号后保存。
    </div>
  </div>
</details>

<div class="tabs">
  <button class="tab active" onclick="switchTab('all')">全部</button>
  <button class="tab" onclick="switchTab('bilibili')">B站</button>
  <button class="tab" onclick="switchTab('douyin')">抖音</button>
</div>

<div id="roomList">
  <div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🔄</div>正在加载...</div>
</div>
</div>

<div class="footer-bar">
  <button class="btn btn-p" onclick="refresh()">🔍 刷新</button>
  <button class="btn btn-s" onclick="toggleAuto()" id="btnAuto">▶ 自动</button>
</div>

<script>
const DEFAULT_URL = "status.json";  // 同域名，无CORS问题
const LS_ROOMS = 'blive_myrooms';
let currentTab = 'all';
let statusData = null;
let repoRooms = [];  // 仓库 rooms.json 中的房间
let myRooms = [];
let selectedPlatform = 'bilibili';
let autoTimer = null;

// ========== 本地房间管理 ==========
function pickPlatform(plat) {
  selectedPlatform = plat;
  document.querySelectorAll('.plat-btn').forEach(b => {
    b.classList.remove('active','bilibili','douyin');
    if (b.dataset.plat === plat) b.classList.add('active', plat);
  });
}

function addRoom() {
  const id = document.getElementById('newRoomId').value.trim();
  const name = document.getElementById('newRoomName').value.trim();
  if (!id) { alert('请输入房间号！'); return; }
  if (myRooms.some(r => r.platform === selectedPlatform && r.id === id)) {
    alert('已存在！'); return;
  }
  const defaultName = selectedPlatform === 'bilibili' ? `B站${id}` : `抖音${id}`;
  myRooms.push({ platform:selectedPlatform, id, name:name||defaultName });
  saveRooms();
  document.getElementById('newRoomId').value = '';
  document.getElementById('newRoomName').value = '';
  document.getElementById('newRoomId').focus();
  renderAll();
}

function removeRoom(i) {
  myRooms.splice(i, 1);
  saveRooms();
  renderAll();
}

function quickFill() {
  const defaults = [
    {platform:'bilibili',id:'1874913653',name:'峰哥亡命天涯'},
    {platform:'douyin',id:'wsyzxz6688',name:'小猪装机'},
    {platform:'bilibili',id:'7734200',name:'LPL赛事官方'},
  ];
  let added = 0;
  for (const d of defaults) {
    if (!myRooms.some(r => r.platform===d.platform && r.id===d.id)) {
      myRooms.push(d); added++;
    }
  }
  if (added) { saveRooms(); renderAll(); }
}

function saveRooms() { localStorage.setItem(LS_ROOMS, JSON.stringify(myRooms)); }
function loadRooms() {
  try { myRooms = JSON.parse(localStorage.getItem(LS_ROOMS) || '[]'); } catch(e) { myRooms = []; }
  if (myRooms.length === 0) {
    // 首次使用，自动预设
    quickFill();
  }
}

function renderRoomConfigList() {
  const container = document.getElementById('roomConfigList');
  document.getElementById('roomCount').textContent = myRooms.length;
  if (myRooms.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text2);font-size:12px">还没有添加房间</div>';
    return;
  }
  const platLabel = {bilibili:'B站',douyin:'抖音'};
  const platClass = {bilibili:'rc-bili',douyin:'rc-dy'};
  container.innerHTML = myRooms.map((r,i) => `
    <div class="room-config-item">
      <span class="rc-platform ${platClass[r.platform]||'rc-bili'}">${platLabel[r.platform]||r.platform}</span>
      <div class="rc-info">
        <div class="rc-name">${esc(r.name)}</div>
        <div class="rc-id">ID: ${esc(r.id)}</div>
      </div>
      <button class="rc-del" onclick="removeRoom(${i})">✕</button>
    </div>
  `).join('');
}

// ========== 状态显示 ==========
function refresh() {
  document.querySelector('.footer-bar .btn-p').innerHTML = '<span class="spinner"></span>';
  fetchStatus();
}

async function fetchStatus() {
  document.getElementById('statusDot').innerHTML = '<span class="dot dot-warn"></span>加载中';
  
  // 同时拉取 rooms.json 和 status.json
  try {
    const [statusResp, roomsResp] = await Promise.all([
      fetch("status.json", { signal: AbortSignal.timeout(8000) }),
      fetch("rooms.json", { signal: AbortSignal.timeout(8000) })
    ]);
    
    if (statusResp.ok) statusData = await statusResp.json();
    if (roomsResp.ok) {
      repoRooms = await roomsResp.json();
      // 仓库房间自动补全本地缺失的
      for (const rr of repoRooms) {
        if (!myRooms.some(r => r.platform === rr.platform && String(r.id) === String(rr.id))) {
          myRooms.push({...rr});
        }
      }
      saveRooms();
      renderRoomConfigList();
    }
    
    const now = new Date();
    document.getElementById('updateTime').textContent = now.toLocaleTimeString('zh-CN');
    const hasLive = (statusData && statusData.rooms || []).some(r => r.status==='live');
    document.getElementById('statusDot').innerHTML = hasLive
      ? '<span class="dot dot-live"></span>有直播'
      : '<span class="dot dot-ok"></span>已更新';
    renderRooms();
  } catch(e) {
    document.getElementById('statusDot').innerHTML = '<span class="dot dot-warn"></span>加载失败';
    renderRooms();
  }
  document.querySelector('.footer-bar .btn-p').innerHTML = '🔍 刷新';
}

function renderRooms() {
  const container = document.getElementById('roomList');
  let rooms = myRooms.slice();
  
  // 将 status 数据合并到本地房间
  if (statusData && statusData.rooms) {
    for (const r of rooms) {
      const match = statusData.rooms.find(s => s.platform === r.platform && String(s.id) === String(r.id));
      if (match) r._status = match;
    }
  }
  
  if (currentTab === 'bilibili') rooms = rooms.filter(r => r.platform === 'bilibili');
  else if (currentTab === 'douyin') rooms = rooms.filter(r => r.platform === 'douyin');
  
  const updated = (statusData && statusData.updated) || '等待首次更新';
  
  if (rooms.length === 0) {
    container.innerHTML = `<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📭</div>该平台没有房间<br><span style="font-size:11px;color:var(--text2)">展开上方「添加监控房间」来添加</span></div>`;
    return;
  }
  
  // 对没有状态数据的房间，尝试直接查询
  const needDirect = rooms.filter(r => !r._status);
  if (needDirect.length > 0) checkDirect(needDirect);
  
  container.innerHTML = `<div style="text-align:center;font-size:10px;color:var(--text2);margin-bottom:8px">数据: ${updated}</div>` +
    rooms.map(r => {
      const s = r._status;
      const cls = s ? s.status : 'offline';
      const badgeCls = s ? {live:'badge-live',replay:'badge-replay',offline:'badge-offline'}[s.status]||'badge-checking' : 'badge-checking';
      const badgeText = s ? {live:'🔴 直播中',replay:'▶️ 回放中',offline:'⚫ 未开播'}[s.status]||'⏳ '+(s.status||'未知') : '⏳ 等待同步';
      const platLabel = r.platform==='bilibili'?'B站':'抖音';
      const liveUrl = r.platform==='bilibili'?`https://live.bilibili.com/${r.id}`:`https://live.douyin.com/${r.id}`;
      let extra = [];
      if (s && s.title) extra.push(`标题: ${esc(s.title)}`);
      if (s && s.area) extra.push(s.area);
      if (s && s.online) extra.push(`人气: ${s.online}`);
      
      return `<div class="room-card ${cls}" id="card-${r.platform}-${r.id}">
        <div class="row1"><span class="name">${esc(r.name)}</span><span class="platform-tag ${r.platform==='bilibili'?'tag-bili':'tag-dy'}">${platLabel}</span></div>
        <div><span class="badge ${badgeCls}" id="badge-${r.platform}-${r.id}">${badgeText}</span></div>
        ${extra.length ? '<div class="info">'+extra.join(' | ')+'</div>' : ''}
        ${!s ? '<div class="info" style="color:var(--yellow)">⚠ 需<a href="https://github.com/racheko-lab/blive-monitor/edit/master/rooms.json" target="_blank">同步到GitHub</a>才能自动监控</div>' : ''}
        ${s && s.status==='live' ? `<a class="btn-sm btn-live" href="${liveUrl}" target="_blank">👉 进入直播间</a>` : ''}
      </div>`;
    }).join('');
}

// 直接查询单个房间（通过代理，用于临时查看）
async function checkDirect(rooms) {
  for (const room of rooms) {
    if (room.platform !== 'bilibili') continue;  // 抖音暂不支持直接查
    try {
      const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.live.bilibili.com/room/v1/Room/get_info?room_id=${room.id}`)}`;
      const resp = await fetch(url, { signal: AbortSignal.timeout(6000) });
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.code === 0 && data.data) {
        const st = {0:'offline',1:'live',2:'replay'}[data.data.live_status] || 'offline';
        const badge = document.getElementById(`badge-${room.platform}-${room.id}`);
        if (badge) {
          const map = {live:['badge-live','🔴 直播中'],replay:['badge-replay','▶️ 回放中'],offline:['badge-offline','⚫ 未开播']};
          const [cls, txt] = map[st] || ['badge-checking', st];
          badge.className = `badge ${cls}`;
          badge.textContent = txt;
        }
      }
    } catch(e) { /* proxy down, ignore */ }
  }
}
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  renderRooms();
}

function toggleAuto() {
  const btn = document.getElementById('btnAuto');
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    btn.textContent = '▶ 自动'; btn.className = 'btn btn-s';
  } else {
    const sec = parseInt(prompt('刷新间隔(秒), 建议60-300', '120')) || 120;
    if (sec < 30) { alert('最少30秒'); return; }
    autoTimer = setInterval(refresh, sec*1000);
    btn.textContent = '⏸ 停止'; btn.className = 'btn btn-g';
    refresh();
  }
}

function renderAll() { renderRoomConfigList(); renderRooms(); }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

document.addEventListener('DOMContentLoaded', () => { loadRooms(); renderRoomConfigList(); refresh(); });
window.addEventListener('beforeunload', () => { if (autoTimer) clearInterval(autoTimer); });
</script>
</body>
</html>
