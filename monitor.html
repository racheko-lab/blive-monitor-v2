<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>B站/抖音 直播监控</title>
<style>
:root{--bg:#0a0a0f;--card:#141420;--accent:#fb7299;--live:#ff4d4f;--text:#e8e8e8;--text2:#999;--green:#52c41a;--blue:#1890ff;--yellow:#faad14;--border:#222;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 70px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.topbar h1{font-size:17px;font-weight:700;color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-ok{background:var(--green)}.dot-warn{background:var(--yellow)}.dot-live{background:var(--live)}
.content{padding:12px 16px}
.tabs{display:flex;gap:6px;margin-bottom:12px;background:var(--card);border-radius:var(--radius);padding:4px}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff}
.room-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid #333}
.room-card.live{border-left-color:var(--live)}.room-card.replay{border-left-color:var(--yellow)}.room-card.offline{border-left-color:#444}
.platform-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;margin-left:8px}
.tag-bili{background:rgba(251,114,153,.15);color:var(--accent)}.tag-dy{background:rgba(24,144,255,.15);color:var(--blue)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.badge-live{background:rgba(255,77,79,.15);color:var(--live)}.badge-replay{background:rgba(250,173,20,.15);color:var(--yellow)}.badge-offline{background:rgba(102,102,102,.15);color:#888}
.btn-sm{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;text-decoration:none;display:inline-block;margin-top:8px}
.btn-live{background:var(--live);color:#fff}
.info{font-size:12px;color:var(--text2);margin-top:6px}
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.94);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;padding-bottom:env(safe-area-inset-bottom,10px)}
.btn{flex:1;padding:10px 12px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}.btn-s{background:transparent;border:1px solid #444;color:var(--text)}.btn-g{background:var(--green);color:#fff}
.tip{background:rgba(24,144,255,.08);border:1px solid rgba(24,144,255,.15);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--blue);margin-top:12px;text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.spinner{width:16px;height:16px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <h1>📡 直播监控</h1>
  <div style="font-size:11px;color:var(--text2)">
    <span id="dot"><span class="dot dot-warn"></span>加载中</span>
    <span id="time" style="margin-left:6px;font-size:10px"></span>
  </div>
</div>

<div class="content">
<div class="tabs">
  <button class="tab active" onclick="tab('all')">全部</button>
  <button class="tab" onclick="tab('bilibili')">B站</button>
  <button class="tab" onclick="tab('douyin')">抖音</button>
</div>
<div id="list"><div class="empty">🔄 加载中...</div></div>
<div class="tip">📋 要添加/修改监控直播间？找 WorkBuddy 直接改 rooms.json</div>
</div>

<div class="footer-bar">
  <button class="btn btn-p" onclick="load()">🔍 刷新</button>
  <button class="btn btn-s" onclick="auto()" id="abtn">▶ 自动</button>
</div>

<script>
var rooms = [], status = null, cur = 'all', timer = null;

function tab(t) { cur = t;
  document.querySelectorAll('.tab').forEach(function(el,i){
    var names = ['全部','B站','抖音'];
    el.className = 'tab' + (el.textContent.trim()===names[i] && (t==='all'||el.textContent.includes(names[i==0?0:i]))?' active':'');
  });
  if (t==='all') document.querySelectorAll('.tab')[0].className = 'tab active';
  else if (t==='bilibili') document.querySelectorAll('.tab')[1].className = 'tab active';
  else document.querySelectorAll('.tab')[2].className = 'tab active';
  render();
}

function auto() {
  if (timer) { clearInterval(timer); timer=null; document.getElementById('abtn').textContent='▶ 自动'; document.getElementById('abtn').className='btn btn-s'; return; }
  var s = parseInt(prompt('刷新间隔(秒)','120'))||120;
  if (s<30) return alert('最少30秒');
  timer = setInterval(load,s*1000);
  document.getElementById('abtn').textContent='⏸ 停止'; document.getElementById('abtn').className='btn btn-g';
  load();
}

function render() {
  if (!rooms.length) {
    document.getElementById('list').innerHTML = '<div class="empty">📭 暂无监控房间</div>';
    return;
  }
  
  var rs = rooms.slice();
  if (cur==='bilibili') rs = rs.filter(function(r){ return r.platform==='bilibili' });
  else if (cur==='douyin') rs = rs.filter(function(r){ return r.platform==='douyin' });
  
  if (!rs.length) { document.getElementById('list').innerHTML = '<div class="empty">📭 该平台暂无房间</div>'; return; }
  
  var up = (status && status.updated) || '等待数据...';
  var h = '<div style="text-align:center;font-size:10px;color:var(--text2);margin-bottom:6px">更新: '+up+'</div>';
  
  for (var i=0; i<rs.length; i++) {
    var r = rs[i];
    var s = null;
    if (status && status.rooms) {
      for (var j=0; j<status.rooms.length; j++) {
        if (status.rooms[j].platform===r.platform && String(status.rooms[j].id)===String(r.id)) {
          s = status.rooms[j]; break;
        }
      }
    }
    var cls = s ? s.status : 'offline';
    var bcls = s ? ({live:'badge-live',replay:'badge-replay',offline:'badge-offline'})[s.status]||'badge-offline' : 'badge-offline';
    var btxt = s ? ({live:'🔴 直播中',replay:'▶️ 回放中',offline:'⚫ 未开播'})[s.status]||s.status : '⏳ 等待数据';
    var pl = r.platform==='bilibili'?'B站':'抖音';
    var url = r.platform==='bilibili'?'https://live.bilibili.com/'+r.id:'https://live.douyin.com/'+r.id;
    var ext = [];
    if (s&&s.title) ext.push('标题: '+esc(s.title));
    if (s&&s.area) ext.push(s.area);
    if (s&&s.online) ext.push('人气: '+s.online);
    
    h += '<div class="room-card '+cls+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<span style="font-size:15px;font-weight:700">'+esc(r.name)+'</span>'+
        '<span class="platform-tag '+(r.platform==='bilibili'?'tag-bili':'tag-dy')+'">'+pl+'</span>'+
      '</div>'+
      '<span class="badge '+bcls+'">'+btxt+'</span>'+
      (ext.length?'<div class="info">'+ext.join(' | ')+'</div>':'')+
      (s&&s.status==='live'?'<a class="btn-sm btn-live" href="'+url+'" target="_blank">👉 进入直播间</a>':'')+
    '</div>';
  }
  document.getElementById('list').innerHTML = h;
}

function load() {
  document.querySelector('.footer-bar .btn-p').innerHTML = '<span class="spinner"></span>';
  
  // jsDelivr CDN (国内有节点，更新快) + 同域名 fallback
  var base = 'https://cdn.jsdelivr.net/gh/racheko-lab/blive-monitor@master/';
  
  function get(u) {
    return fetch(u,{signal:AbortSignal.timeout(8000)}).then(function(r){return r.ok?r.json():Promise.reject('fail')});
  }
  
  get(base+'status.json').then(function(d){status=d;}).catch(function(){
    return get('status.json');
  }).then(function(d){if(d)status=d;}).catch(function(){})
  .then(function(){
    return get(base+'rooms.json').then(function(d){rooms=d;}).catch(function(){
      return get('rooms.json');
    }).then(function(d){if(d)rooms=d;});
  }).catch(function(){})
  .then(function(){
    var now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString('zh-CN');
    var live = status&&status.rooms?status.rooms.some(function(r){return r.status==='live'}):false;
    document.getElementById('dot').innerHTML = live?'<span class="dot dot-live"></span>有直播':'<span class="dot dot-ok"></span>已更新';
    render();
    document.querySelector('.footer-bar .btn-p').innerHTML = '🔍 刷新';
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded',load);
window.addEventListener('beforeunload',function(){ if(timer) clearInterval(timer); });
</script>
</body>
</html>
